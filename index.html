<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eyes-Closed Word Processor</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.webmanifest">
</head>

<body>
    <div id="app-container">
        <aside id="control-panel">
            <h1>Eyes-Closed WP</h1>
            <p class="tagline">Type without watching.</p>

            <section class="control-section">
                <h2>Monitoring</h2>
                <button id="btn-start" class="btn primary">Start Monitoring</button>
                <div class="status-row">
                    <div class="status-indicator">
                        <span id="status-dot" class="dot inactive"></span>
                        <span id="status-text">Inactive</span>
                    </div>
                    <span id="session-timer" class="session-timer hidden">0:00</span>
                </div>
            </section>

            <section class="control-section">
                <div class="section-header">
                    <h2>Sound</h2>
                    <button id="btn-mute" class="btn-icon" title="Mute all audio">🔊</button>
                </div>
                <div class="setting-row">
                    <label>Mode</label>
                    <select id="select-audio-mode">
                        <option value="silent">Silent</option>
                        <option value="noise">Ambient Only</option>
                        <option value="tones">Tones Only</option>
                        <option value="both" selected>Ambient + Tones</option>
                    </select>
                </div>
                <div id="noise-settings">
                    <div class="setting-row">
                        <label>Ambient</label>
                        <select id="select-noise-type">
                            <option value="rain">Rain</option>
                            <option value="fan">Fan</option>
                            <option value="fireplace">Fireplace</option>
                            <option value="pink" selected>Pink Noise</option>
                            <option value="brown">Brown Noise</option>
                            <option value="deep">Deep Brown</option>
                            <option value="white">White Noise</option>
                        </select>
                    </div>
                </div>
                <div id="tone-settings">
                    <div class="setting-row">
                        <label>Active</label>
                        <select id="select-active-tone">
                            <option value="harp">Light Harp</option>
                            <option value="piano">Soft Piano</option>
                            <option value="woodblock">Woodblock</option>
                            <option value="marimba">Marimba</option>
                            <option value="guitar">Guitar Pluck</option>
                            <option value="bell">Bell Chime</option>
                            <option value="synth">Synthy Blip</option>
                            <option value="water">Water Drop</option>
                            <option value="typewriter">Typewriter</option>
                            <option value="shaker">Soft Shaker</option>
                        </select>
                    </div>
                    <div class="setting-row">
                        <label>Idle</label>
                        <select id="select-idle-tone">
                            <option value="thunder">Low Thunder</option>
                            <option value="wind">Wind Howl</option>
                            <option value="pad">Deep Pad</option>
                            <option value="ocean">Ocean Wave</option>
                            <option value="gong">Distant Gong</option>
                            <option value="bass">Bass Pluck</option>
                            <option value="riser">Subtle Riser</option>
                            <option value="drone">Heavy Drone</option>
                            <option value="didge">Didgeridoo</option>
                            <option value="thud">Bass Thud</option>
                        </select>
                    </div>
                </div>
                <div class="setting-row">
                    <label>Volume</label>
                    <input type="range" id="vol-slider" min="0" max="1" step="0.05" value="0.5">
                </div>
                <div class="test-buttons">
                    <button id="btn-test-active" class="btn small">Active</button>
                    <button id="btn-test-idle" class="btn small">Idle</button>
                    <button id="btn-test-error" class="btn small">Error</button>
                </div>
            </section>

            <section class="control-section">
                <h2>Writing</h2>
                <div class="setting-row">
                    <label>Auto-Save</label>
                    <select id="select-autosave-interval">
                        <option value="15000">15 sec</option>
                        <option value="30000" selected>30 sec</option>
                        <option value="60000">1 min</option>
                        <option value="120000">2 min</option>
                        <option value="300000">5 min</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label>Save Chime</label>
                    <select id="select-autosave-chime">
                        <option value="on" selected>On</option>
                        <option value="off">Off</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label>Word Goal</label>
                    <input type="number" id="word-goal-input" class="number-input" placeholder="—" min="0" max="99999">
                </div>
            </section>

            <section class="control-section">
                <h2>Drive Backup</h2>
                <button id="btn-auth" class="btn secondary">Authorize Google Drive</button>
                <div id="drive-status" class="small-text">Not Connected</div>
                <button id="btn-download" class="btn secondary" style="margin-top:0.5rem">Download Draft</button>
            </section>
        </aside>

        <main id="editor-panel">
            <header class="editor-header">
                <div class="header-left">
                    <button id="btn-privacy" class="btn secondary">Privacy Mode</button>
                    <button id="btn-toggle-text" class="btn secondary">Hide Text</button>
                </div>
                <div class="header-right">
                    <div id="word-goal-bar" class="hidden">
                        <div id="goal-bar-fill"></div>
                        <span id="goal-bar-label"></span>
                    </div>
                    <span id="word-count">0 words</span>
                </div>
            </header>
            <textarea id="editor" placeholder="Start typing... (fff = check backup status, jjj = manual save)"></textarea>
        </main>
    </div>

    <button id="btn-stop-floating" class="btn danger hidden">Stop</button>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <script type="module" src="js/main.js"></script>
</body>

</html>
